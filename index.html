<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }

        .main-color{
            color: #002C5C;
        }
        .gray-text{
            color: #323B49;
        }
        .interview-color{
            color: #10B981;
        }
        .rejected-color{
            color: #EF4444;
        }
    </style>

</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <header class="pt-16 max-w-[1048px] mx-auto border-b-2 border-gray-300">
        <h1 class="font-bold main-color text-4xl">Job Application Tracker</h1>
        <!-- jobs-count-cards -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 my-8">
            <!-- total job number -->
            <div class="p-4 rounded-lg bg-white">
                <h1 class="gray-text">total</h1>
                <p class="font-bold main-color text-2xl">8</p>
            </div>
            <!-- total job number -->
            <div class="p-4 rounded-lg bg-white">
                <h1 class="gray-text">Interview</h1>
                <p class="font-bold interview-color text-2xl">0</p>
            </div>
            <!-- total job number -->
            <div class="p-4 rounded-lg bg-white">
                <h1 class="gray-text">Rejected</h1>
                <p class="font-bold rejected-color text-2xl">0</p>
            </div>
        </section>
    </header>

    <!-- jobs -->
    <section class="max-w-[1048px] mx-auto pt-8">
        <!-- jobs header container -->
        <div class="flex justify-between">
            <h2 class="main-color font-bold text-xl">Available Jobs</h2>
            <p class="gray-text ">8 jobs</p>
        </div>
    </section>

</body>

</html>
